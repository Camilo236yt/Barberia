<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Importar datos · Capitán Gold</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
      background: #111;
      color: #f5f5f5;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    main {
      width: min(520px, 100%);
      padding: 32px;
      border: 1px solid #80611f;
      border-radius: 18px;
      background: #1c1c1c;
      box-shadow: 0 20px 50px #0008;
    }
    h1 { margin-top: 0; font-family: Georgia, serif; }
    p { color: #c7c7c7; line-height: 1.5; }
    label { display: block; margin: 24px 0 8px; font-weight: 700; }
    input, button {
      width: 100%;
      min-height: 48px;
      border-radius: 10px;
      box-sizing: border-box;
      font: inherit;
    }
    input {
      border: 1px solid #666;
      padding: 0 14px;
      background: #111;
      color: white;
    }
    button {
      margin-top: 14px;
      border: 0;
      background: #c6a04a;
      color: #111;
      font-weight: 800;
      cursor: pointer;
    }
    button:disabled { cursor: wait; opacity: .65; }
    #result {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
    #result.ok { display: block; background: #143c2b; color: #b8f3d5; }
    #result.error { display: block; background: #4a2020; color: #ffc6c6; }
  </style>
</head>
<body>
  <main>
    <h1>Importar datos anteriores</h1>
    <p>
      Esta operación combina la información por identificador, por lo que no
      duplica ventas, cierres ni gastos.
    </p>
    <form
      method="post"
      action="/api/migrar-datos"
      onsubmit="return confirm('¿Importar ahora todos los datos anteriores?')"
    >
      <label for="secret">Clave de importación</label>
      <input
        id="secret"
        name="import_secret"
        type="password"
        autocomplete="off"
        required
      >
      <button type="submit">Importar todos los datos</button>
    </form>
    <p>
      Al terminar, el navegador mostrará el número de ventas, cierres y gastos
      importados.
    </p>
  </main>
</body>
</html>
